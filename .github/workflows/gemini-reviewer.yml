name: Gemini Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gemini AI Review
        # Google 공식 액션 (https://github.com/google-github-actions/run-gemini-cli)
        # GEMINI_API_KEY 시크릿이 리포지토리에 등록돼 있어야 동작한다.
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: '/pr-code-review'
